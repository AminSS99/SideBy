spring.application.name=comparison-app
server.port=${SERVER_PORT:8080}

# Gemini AI Configuration (Primary)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

# DeepSeek AI Configuration (Fallback)
deepseek.api.key=${DEEPSEEK_API_KEY:}

# Firecrawl extraction (optional for local dev; Jsoup fallback is used when empty)
firecrawl.api.key=${FIRECRAWL_API_KEY:}
firecrawl.api.url=${FIRECRAWL_API_URL:https://api.firecrawl.dev/v2/scrape}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,https://snapsolve.ink}
