<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#050505" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
  <!-- Glowing icon graphic: Two side-by-side comparison scales / columns -->
  <g transform="translate(128, 128)">
    <!-- Column 1 -->
    <rect x="56" y="80" width="36" height="150" rx="18" fill="url(#glow)"/>
    <!-- Column 2 -->
    <rect x="164" y="30" width="36" height="200" rx="18" fill="url(#glow)"/>
    <!-- Connecting bridge/bar at the bottom -->
    <rect x="36" y="220" width="184" height="16" rx="8" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
